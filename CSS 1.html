<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>styles</title>
    <style>
      h1 {
        color: rgb(34, 255, 0);
        background-color: bisque;
        text-align: center;
        direction: rtl;
        font-family: sans-serif;
        font-size: xx-large;
        font-style: italic;
        font-weight: bolder;
        text-decoration-line: underline;
        text-decoration-style: double;
        text-decoration-color: tomato;
        text-decoration-thickness: inherit;
        text-transform: capitalize;
        text-indent: 70px;
        letter-spacing: 20px;
        line-height: 0.9;
        word-spacing: 20px;
        text-shadow: 2px 3px 5px orangered;
      }
    
      h2{
        border-style: outset;
        border-color: brown;
        border-top-style: inset;
        border-radius: 20px;
        margin: 25px 50px 75px 100px;
        padding-left: 50px;
        padding-right: 30px;
        padding-top: 40px;
        padding-bottom: 20px;
        height: 40px;
        width: 100%; 
        max-width: fit-content ;
      }
      table, th, td {
        border: 4px solid;
        width: 70%;
      }
      table,th,td{
      border-collapse: collapse;
      border: 1px solid;
      }

      tr:nth-child(even){
        background-color:pink;
      }
      
      
      
      tr:hover{
        background-color: aqua;
      color: blue;
    }

      div{
        display: inline-block;
        background-image: url(img.jpg);
        background-size:cover;
        color: blanchedalmond;
        height: 100px;
        width: 20%;
        font-size: 20px;
      }
    </style>
  </head>
  <body>
    <h1>font related decorations 1 </h1>
    <h2>border padding work </h2>
    <table>
      <tr>
        <th>Harini</th>
        <th>kviya</th>
        <th>vasanthi</th>
      </tr>
      <tr>
        <th>90/100</th>
        <th>30/100</th>
        <th>100/100</th>
      </tr>
      <tr>
        <th>average</th>
        <th>worse</th>
        <th>best</th>
      </tr>
      
    <div>local</div>
    <div>folder</div>
    <div>file</div>
    
    
    
</html>
